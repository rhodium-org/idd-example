uid: SR-0002
type: system_requirement
status: approved
title: Accept long passphrases without truncation
text: The account service accepts passwords of at least 64 characters, rejects only
  those beyond 128 characters, and never silently truncates before hashing, so a
  resident using a passphrase or password manager is not quietly weakened.
links:
- target: UR-0001
  type: implements
- target: "asvs:SR-0004"
  type: satisfies
