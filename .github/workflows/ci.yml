name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Installs tl-compose and, transitively, throughline (tl). Pinned to the
      # compose repo's main until throughline-compose is published to PyPI.
      - name: Install throughline-compose
        run: pip install "throughline-compose @ git+https://github.com/rhodium-org/throughline-compose@main"

      # Composes the pinned `asvs` source into the union and validates the whole
      # graph. This fetches the source from its git origin, so the job needs network.
      - name: Composition gate (the composed graph must stay sound)
        run: tl-compose check --strict
