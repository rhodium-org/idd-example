name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Installs tl-compose and, transitively, throughline (tl) from PyPI, so the
      # job needs no credentials for the (private) compose tooling repo.
      - name: Install throughline-compose
        run: pip install throughline-compose

      # Composes the pinned `asvs` source into the union and validates the whole
      # graph. This fetches the source from its git origin, so the job needs network.
      - name: Composition gate (the composed graph must stay sound)
        run: tl-compose check --strict

      # The published document (docs/spec.md) and the README count badges must
      # still match this project's own graph.
      - name: Docs freshness gate
        run: tl-compose docs --check
