[project]
name = "Council housing resident service (throughline-compose example)"
format_version = 2

# A worked example of a *composed* project. This is an ordinary throughline
# project — its own product requirements live under intents/, user-requirements/
# and system-requirements/ — that additionally adopts a published standard by
# reference. The OWASP ASVS source is bound to the namespace `asvs` below, and
# individual product requirements cite ASVS clauses as `asvs:SR-NNNN`.
#
# Drive this project with `tl-compose`, never bare `tl`: the composition-aware
# `check` merges the sources into one union graph and validates it. Bare `tl`
# fails fast the moment it meets a namespace-qualified reference it cannot resolve.

# The source. The consumer picks the namespace (`import X as Y`); the source does
# not name itself. A source is adopted by reference — a git `url` pinned to an
# edition with `ref` — never vendored or copied. tl-compose fetches the pinned ref
# into a per-user cache outside this project, so the consumer's own item scan never
# sees it. To develop a source and its consumer side by side, a local `path` may be
# used instead of `url` + `ref`.
#
# The `ref` pins a published edition tag: moving to a new upstream edition is a
# one-line change here, and the borrowed graph is never edited in place.
[[sources]]
namespace = "asvs"
url = "https://github.com/timebacksolutions/throughline-asvs"
ref = "v4.0.3"

[grounding]
root_types = ["intent"]
delivery_roots = ["intent"]
ground_link_types = ["derives_from", "implements"]
ai_origins = ["ai", "hybrid"]

# The union is governed by THIS schema, so the consumer must declare types, links
# and statuses that are a superset of what every source uses internally. The ASVS
# source marks source_ref/level required on its own items; here they are optional,
# which still accepts the source's items (they carry them) while not forcing the
# consumer's own items to.
[types.user_requirement]
attrs.source_ref = { required = false }

[types.system_requirement]
attrs.source_ref = { required = false }
attrs.level = { required = false }

[links]
types = ["derives_from", "implements", "satisfies", "relates"]

[link_rules]
derives_from = { from = ["user_requirement"], to = ["intent"] }
implements   = { from = ["system_requirement"], to = ["user_requirement"] }
# The borrowed-clause link: a product requirement satisfies an ASVS verification
# requirement. `satisfies` is a traceability link, not a grounding link, so a
# product SR still grounds through `implements`, not through the standard.
satisfies    = { from = ["system_requirement"], to = ["system_requirement"] }

[status]
values = ["proposed", "draft", "deferred", "approved", "ratified", "implemented",
          "verified", "suspect", "rejected", "deleted"]

[transitions]
proposed    = ["draft", "approved", "ratified", "deferred", "rejected", "deleted"]
draft       = ["approved", "deferred", "rejected", "deleted"]
deferred    = ["draft", "approved", "rejected", "deleted"]
approved    = ["ratified", "implemented", "deferred", "suspect", "rejected", "deleted"]
ratified    = ["implemented", "suspect", "rejected", "deleted"]
implemented = ["verified", "suspect", "rejected", "deleted"]
verified    = ["implemented", "suspect", "deleted"]
suspect     = ["approved", "ratified", "implemented", "verified", "rejected", "deleted"]
rejected    = ["draft", "deleted"]

# `tl-compose docs` regenerates docs/spec.md from this project's own graph and
# `tl-compose docs --check` gates its freshness. Publishing activates the
# `unpublished` rule for this project's local items — every live normative local
# item must be referenced by a published document. (Borrowed asvs clauses are not
# this project's to publish; they are covered by the source's own docs.)
[docs]
paths = ["docs/*.md", "README.md"]
